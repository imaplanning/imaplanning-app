<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMA Planner - Tu Asesor Financiero</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <img src="https://i.imgur.com/LOGO_PLACEHOLDER.png" alt="Logo de imaplanning" class="logo">
        <h1>Decisiones con Propósito</h1>
    </header>

    <main class="chat-container">
        <div id="chat-window" class="chat-window">
            </div>
        <div id="contact-form-container" style="display: none;">
            <h4>¡Excelente! Estás a un paso de concretar tu plan.</h4>
            <p>Para prepararte la propuesta con los instrumentos específicos, por favor déjanos tus datos.</p>
            <input type="text" id="contact-name" class="contact-input" placeholder="Nombre Completo" required>
            <input type="email" id="contact-email" class="contact-input" placeholder="Correo Electrónico" required>
            <button id="submit-contact-button">Enviar y Agendar Sesión</button>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Escribe tu respuesta aquí...">
            <button id="send-button">Enviar</button>
        </div>
    </main>
    
    <footer class="app-footer">
        <p>&copy; 2025 imaplanning - Todos los derechos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
